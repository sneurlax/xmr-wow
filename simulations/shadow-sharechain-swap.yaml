# Shadow / monerosim scenario that drives the xmr-wow CLI with --transport sharechain.
#
# Proves a sharechain-mediated atomic swap completes without any manual protocol
# message exchange. All Init, Response, AdaptorPreSig, and ClaimProof messages
# route through the sharechain-node process running xmr-wow-node --rpc-only.
#
# Alice and Bob agents both point --node-url at sharechain-node:18091.

metadata:
  scenario: shadow_xmr_wow_sharechain_swap
  generator: manual
  version: '1.0'
  purpose: 'Sharechain-mediated atomic swap with no manual message exchange'

general:
  stop_time: 4h
  parallelism: 0
  simulation_seed: 143
  enable_dns_server: true
  shadow_log_level: warning
  bootstrap_end_time: 2.5h
  progress: true
  runahead: 100ms
  process_threads: 2

network:
  type: 1_gbit_switch
  latency: 100ms
  peer_mode: Dynamic

agents:
  sharechain-node:
    # Minimal RPC-only xmr-wow-node for Init/Response/AdaptorPreSig/ClaimProof.
    # routing so Alice and Bob never exchange protocol messages out-of-band.
    # No daemon or wallet needed; just the sharechain coordination server.
    start_time: 0s
    attributes:
      binary: target/release/xmr-wow-node
      args: '--rpc-port 18091 --rpc-only'

  xmr-miner:
    daemon: monerod
    wallet: 'monero-wallet-rpc'
    script: agents.autonomous_miner
    start_time: 0s
    hashrate: 100
    can_receive_distributions: true

  wow-miner:
    daemon: monerod
    wallet: 'monero-wallet-rpc'
    script: agents.autonomous_miner
    start_time: 0s
    hashrate: 100
    can_receive_distributions: true

  alice:
    daemon: monerod
    wallet: 'monero-wallet-rpc'
    script: agents.xmr_wow_sharechain_agent
    start_time: 60s
    attributes:
      role: alice
      binary: target/release/xmr-wow
      node_url: 'http://sharechain-node:18091'
      db: /tmp/alice-sharechain.db
      password: shadow-test
      amount_xmr: '1000000000000'
      amount_wow: '500000000000'
      xmr_lock_blocks: '120'
      wow_lock_blocks: '260'
      alice_refund_address: 'SHADOW_ALICE_REFUND'
      destination: 'SHADOW_ALICE_DESTINATION'

  bob:
    daemon: monerod
    wallet: 'monero-wallet-rpc'
    script: agents.xmr_wow_sharechain_agent
    start_time: 60s
    attributes:
      role: bob
      binary: target/release/xmr-wow
      node_url: 'http://sharechain-node:18091'
      db: /tmp/bob-sharechain.db
      password: shadow-test
      bob_refund_address: 'SHADOW_BOB_REFUND'
      destination: 'SHADOW_BOB_DESTINATION'

  miner-distributor:
    script: agents.miner_distributor
    wait_time: 9000
    initial_wait_time: 0
    max_transaction_amount: '5.0'
    min_transaction_amount: '2.0'
    transaction_frequency: 30
    md_n_recipients: 2
    md_out_per_tx: 2
    md_output_amount: 10.0
