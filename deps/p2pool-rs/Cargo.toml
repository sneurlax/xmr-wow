[workspace]
members = [
    "p2pool_config",
    "p2pool_crypto",
    "p2pool_monero",
    "p2pool_lib",
    "p2pool_node",
]
resolver = "2"

[workspace.package]
version = "0.1.0"
edition = "2021"
authors = []
license = "GPL-3.0-only"
description = "P2Pool for Monero in Rust"
repository = "https://github.com/monero-project/p2pool-rs"
keywords = ["monero", "mining", "pool", "p2p", "randomx"]
categories = ["cryptography::cryptocurrencies"]
publish = false

[profile.release]
codegen-units = 1
lto = "fat"
strip = "symbols"
panic = "abort"

[workspace.dependencies]
tokio = { version = "1.0", features = ["full"] }
tokio-util = { version = "0.7", features = ["codec", "net"] }
futures = "0.3"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
tracing-appender = "0.2"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
thiserror = "2.0"
anyhow = "1.0"
clap = { version = "4.0", features = ["derive", "env"] }
hex = "0.4"
bytes = "1.0"
async-trait = "0.1"
reqwest = { version = "0.12", features = ["json"] }
zmq = "0.10"
sha3 = "0.10"
curve25519-dalek = { version = "4", features = ["digest"] }
ed25519-dalek = "2"
tiny-keccak = { version = "2.0", features = ["keccak"] }
base58-monero = { version = "2.0" }
config = "0.13"
rocksdb = { version = "0.24", features = ["multi-threaded-cf"] }
rand = "0.8"
dashmap = "6"
tokio-stream = "0.1"
chrono = { version = "0.4", features = ["serde"] }
mockall = "0.13"
randomx-rs = "1"

# Internal crates
p2pool_config = { path = "p2pool_config" }
p2pool_crypto = { path = "p2pool_crypto" }
p2pool_monero = { path = "p2pool_monero" }
p2pool_lib = { path = "p2pool_lib" }
