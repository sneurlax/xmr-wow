[package]
name    = "wownero-simnet"
version = "0.1.0"
edition = "2021"
description = "Programmatic in-process Wownero simulation network for development and testing"
license = "MIT"

# Standalone excluded package: root workspace excludes this crate so it keeps
# its own lockfile/build graph when invoked directly, while remaining usable as
# a path dependency from workspace members.

[patch."https://github.com/monero-oxide/monero-oxide.git"]
monero-address = { git = "https://github.com/sneurlax/monero-oxide", rev = "f9afcdda9e463ed2a94821265929acf60fa57346" }
monero-interface = { git = "https://github.com/sneurlax/monero-oxide", rev = "f9afcdda9e463ed2a94821265929acf60fa57346" }
monero-oxide = { git = "https://github.com/sneurlax/monero-oxide", rev = "f9afcdda9e463ed2a94821265929acf60fa57346" }
monero-wallet = { git = "https://github.com/sneurlax/monero-oxide", rev = "f9afcdda9e463ed2a94821265929acf60fa57346" }

[patch."https://github.com/sneurlax/cuprate"]
cuprate-consensus-rules = { path = "../cuprate-consensus-rules" }

# Cuprate crates pinned to the compatibility commit in sneurlax/cuprate.
# The cuprate consensus engine is chain-agnostic for block structure.
[dependencies]
cuprate-blockchain        = { git = "https://github.com/sneurlax/cuprate", rev = "7b2e472d0467e1520c7c5252742fb5a463e60a5d" }
cuprate-database          = { git = "https://github.com/sneurlax/cuprate", rev = "7b2e472d0467e1520c7c5252742fb5a463e60a5d" }
cuprate-database-service  = { git = "https://github.com/sneurlax/cuprate", rev = "7b2e472d0467e1520c7c5252742fb5a463e60a5d" }
cuprate-consensus         = { git = "https://github.com/sneurlax/cuprate", rev = "7b2e472d0467e1520c7c5252742fb5a463e60a5d" }
cuprate-consensus-context = { git = "https://github.com/sneurlax/cuprate", rev = "7b2e472d0467e1520c7c5252742fb5a463e60a5d" }
cuprate-consensus-rules   = { git = "https://github.com/sneurlax/cuprate", rev = "7b2e472d0467e1520c7c5252742fb5a463e60a5d", features = ["rayon"] }
cuprate-types             = { git = "https://github.com/sneurlax/cuprate", rev = "7b2e472d0467e1520c7c5252742fb5a463e60a5d", features = ["blockchain"] }
cuprate-helper            = { git = "https://github.com/sneurlax/cuprate", rev = "7b2e472d0467e1520c7c5252742fb5a463e60a5d", features = ["std", "fs", "asynch", "net"] }
cuprate-constants         = { git = "https://github.com/sneurlax/cuprate", rev = "7b2e472d0467e1520c7c5252742fb5a463e60a5d" }

# wownero-oxide is vendored in-tree and already uses renamed package names:
# `wownero-oxide`, `wownero-wallet`, and `wownero-address`.
monero-oxide   = { git = "https://github.com/monero-oxide/monero-oxide", rev = "a941dfff1a5333b6349d9a1ee5de49c158b0e3d2", default-features = false, features = ["std"] }
wownero-oxide   = { path = "../wownero-oxide/monero-oxide", default-features = false, features = ["std"] }
wownero-wallet  = { path = "../wownero-oxide/monero-oxide/wallet", features = ["std"], default-features = false }
wownero-address = { path = "../wownero-oxide/monero-oxide/wallet/address", features = ["std"], default-features = false }
curve25519-dalek = { version = "4", features = ["alloc", "zeroize"] }
rand      = "0.8"
rand_core = { version = "0.6", features = ["std", "getrandom"] }
zeroize   = { version = "1", features = ["zeroize_derive"] }
axum      = "0.7"
serde     = { version = "1", features = ["derive"] }
serde_json = "1"
bytes     = "1"
indexmap  = "2"
hex      = "0.4"
tokio    = { version = "1", features = ["rt-multi-thread", "macros", "sync", "time", "net"] }
tower    = { version = "0.5", features = ["util"] }
tracing  = { version = "0.1", features = ["std"] }
tempfile = "3"
thiserror = "2"
anyhow   = "1"
rayon    = "1"

[features]
default = []
merge-mining = []
spend-tests = []

[dev-dependencies]
tokio = { version = "1", features = ["rt-multi-thread", "macros", "sync"] }
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
reqwest = { version = "0.12", features = ["json"] }
