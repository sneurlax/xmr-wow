[advisories]
version = 2

db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]

yanked = "deny"

ignore = []

[licenses]
version = 2

# Commented licenses would be allowed but are not currently present
allow = [
  # Effective public domain
  # "CC0-1.0",
  "Unlicense",

  # Attribution required
  "MIT",
  # "MITNFA",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Zlib",
  # "Unicode-DFS-2016",
  "Unicode-3.0",
  # "OpenSSL",
  "CDLA-Permissive-2.0",

  # Non-invasive copyleft
  # "MPL-2.0",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  # "GPL-3.0 WITH Classpath-exception-2.0",
]

exceptions = []

[[licenses.clarify]]
name = "ring"
version = "*"
expression = "MIT AND ISC AND OpenSSL"
license-files = [
  { path = "LICENSE", hash = 0xbd0eed23 }
]

[bans]
multiple-versions = "warn"
wildcards = "warn"
highlight = "all"
deny = [
  # Contains a non-reproducible binary blob
  # https://github.com/serde-rs/serde/pull/2514
  # https://github.com/serde-rs/serde/issues/2575
  { name = "serde_derive", version = ">=1.0.172, <1.0.185" },
  # Introduced an insecure implementation of `borsh` removed with `0.15.1`
  # https://github.com/rust-lang/hashbrown/issues/576
  { name = "hashbrown", version = "=0.15.0" },
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
