[package]
name = "wownero-clsag"
version = "0.1.0"
description = "The CLSAG linkable ring signature, as defined by the Monero protocol"
license = "MIT"
repository = "https://github.com/monero-oxide/monero-oxide/tree/main/monero-oxide/ringct/clsag"
authors = ["Luke Parker <lukeparker5132@gmail.com>"]
edition = "2021"
rust-version = "1.68"

[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]

[dependencies]
std-shims = { version = "0.1.5", default-features = false }

thiserror = { version = "2", default-features = false }

rand_core = { version = "0.6", default-features = false }
zeroize = { version = "^1.5", default-features = false, features = ["zeroize_derive"] }
subtle = { version = "^2.4", default-features = false }

# Cryptographic dependencies
curve25519-dalek = { version = "4", default-features = false, features = ["alloc", "zeroize"] }

# Multisig dependencies
rand_chacha = { version = "0.3", default-features = false, optional = true }
transcript = { package = "flexible-transcript", version = "0.3", default-features = false, features = ["recommended"], optional = true }
group = { version = "0.13", default-features = false, optional = true }
dalek-ff-group = { version = "0.5", default-features = false, optional = true }
frost = { package = "modular-frost", version = "0.11", default-features = false, features = ["ed25519"], optional = true }

# Other Monero dependencies
monero-io = { package = "wownero-io", path = "../../io", version = "0.1", default-features = false }
monero-ed25519 = { package = "wownero-ed25519", path = "../../ed25519", version = "0.1", default-features = false }

[dev-dependencies]
frost = { package = "modular-frost", version = "0.11", default-features = false, features = ["ed25519", "tests"] }

[features]
std = [
  "std-shims/std",

  "thiserror/std",

  "rand_core/std",
  "zeroize/std",
  "subtle/std",

  "rand_chacha?/std",
  "group?/alloc",

  "monero-io/std",
  "monero-ed25519/std",
]
compile-time-generators = ["curve25519-dalek/precomputed-tables"]
multisig = ["rand_chacha", "transcript", "group", "dalek-ff-group", "frost", "std"]
default = ["std", "compile-time-generators"]
