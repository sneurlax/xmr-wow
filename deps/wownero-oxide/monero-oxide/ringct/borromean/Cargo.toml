[package]
name = "wownero-borromean"
version = "0.1.0"
description = "Borromean ring signatures arranged into a range proof, as done by the Monero protocol"
license = "MIT"
repository = "https://github.com/monero-oxide/monero-oxide/tree/main/monero-oxide/ringct/borromean"
authors = ["Luke Parker <lukeparker5132@gmail.com>"]
edition = "2021"
rust-version = "1.68"

[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]

[dependencies]
std-shims = { version = "0.1.5", default-features = false }

zeroize = { version = "^1.5", default-features = false, features = ["zeroize_derive", "alloc"] }

# Cryptographic dependencies
curve25519-dalek = { version = "4", default-features = false, features = ["alloc", "zeroize"] }

# Other Monero dependencies
monero-io = { package = "wownero-io", path = "../../io", version = "0.1", default-features = false }
monero-ed25519 = { package = "wownero-ed25519", path = "../../ed25519", version = "0.1", default-features = false }

[features]
std = [
  "std-shims/std",

  "zeroize/std",

  "monero-io/std",
  "monero-ed25519/std",
]
default = ["std"]
