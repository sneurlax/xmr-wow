[package]
name = "wownero-bulletproofs"
version = "0.1.0"
description = "Bulletproofs(+) range proofs, as defined by the Monero protocol"
license = "MIT"
repository = "https://github.com/monero-oxide/monero-oxide/tree/main/monero-oxide/ringct/bulletproofs"
authors = ["Luke Parker <lukeparker5132@gmail.com>"]
edition = "2021"
rust-version = "1.68"

[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]

[dependencies]
std-shims = { version = "0.1.5", default-features = false }

thiserror = { version = "2", default-features = false }

rand_core = { version = "0.6", default-features = false }
zeroize = { version = "^1.5", default-features = false, features = ["zeroize_derive"] }

curve25519-dalek = { version = "4", default-features = false, features = ["alloc", "zeroize"] }

monero-io = { package = "wownero-io", path = "../../io", version = "0.1", default-features = false }
monero-ed25519 = { package = "wownero-ed25519", path = "../../ed25519", version = "0.1", default-features = false }
monero-primitives = { package = "wownero-primitives", path = "../../primitives", version = "0.1", default-features = false }

monero-bulletproofs-generators = { package = "wownero-bulletproofs-generators", path = "./generators", version = "0.1", default-features = false }

[build-dependencies]
curve25519-dalek = { version = "4", default-features = false, features = ["alloc", "zeroize"] }
monero-bulletproofs-generators = { package = "wownero-bulletproofs-generators", path = "./generators", version = "0.1", default-features = false }

[dev-dependencies]
hex-literal = { version = ">= 0.4, <= 1", default-features = false }

[features]
std = [
  "std-shims/std",

  "thiserror/std",

  "rand_core/std",
  "zeroize/std",

  "monero-io/std",
  "monero-ed25519/std",
  "monero-bulletproofs-generators/std",
  "monero-primitives/std",
]
compile-time-generators = ["curve25519-dalek/precomputed-tables"]
default = ["std", "compile-time-generators"]
