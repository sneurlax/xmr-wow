# CI configuration for xmr-wow atomic swap project.
#
# 1. xmr-wow-script needs a separate test step with --features stub-crypto.
#    Without it, the script VM tests are silently skipped by
#    `cargo test --workspace`.
#
# 2. Integration tests run with --test-threads=1. xmr-wow-wallet and
#    xmr-wow-integration use the in-process cuprate-simnet and
#    wownero-simnet emulators, which are not safe to run in parallel.
#
# 3. Live-daemon tests are opt-in. Tests requiring real XMR/WOW daemons
#    are gated behind --features privileged-live-tests and need funded
#    wallets plus synced daemons.
#
# 4. wownero-bulletproofs tests are excluded from the default lane; they
#    are vendored primitives that take several minutes each.

name: CI

on:
  pull_request:
  push:
    branches: [main, staging]

jobs:
  test:
    name: Test and Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache build artifacts
        uses: Swatinem/rust-cache@v2

      # --- Core workspace tests ---

      - name: Test workspace
        # Runs all workspace crates with default features.
        # NOTE: This silently skips xmr-wow-script tests (required-features).
        # The next step covers the script VM explicitly.
        run: cargo test --workspace

      - name: Test xmr-wow-script (stub-crypto)
        # CRITICAL: Without this step, all 50 script VM tests are skipped.
        # The stub-crypto feature enables StubBackend (always-pass) to test
        # VM control-flow, stack manipulation, timelocks, and serialization
        # without real crypto deps. This is the only way to run script tests.
        run: cargo test -p xmr-wow-script --features stub-crypto

      - name: Test xmr-wow-script (real-crypto)
        # Verifies Ed25519Backend with real curve25519-dalek scalar multiplication.
        # This is the ONLY test of the actual cryptographic correctness of
        # OP_CHECKKEYPAIR and OP_CHECKKEYPAIRVERIFY; the atomic swap security anchor.
        run: cargo test -p xmr-wow-script --features real-crypto --test real_crypto_roundtrip

      - name: Integration tests (serial for simnet stability)
        # Run wallet and integration crates sequentially to avoid resource
        # contention between cuprate-simnet and wownero-simnet instances.
        # These tests take ~40s in debug mode; stable under serial scheduling.
        run: >
          cargo test -p xmr-wow-wallet -p xmr-wow-integration
          -- --test-threads=1

      # --- Coverage (informational, no hard floor) ---

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov

      - name: Coverage report (workspace)
        # Informational coverage: no minimum threshold enforced.
        run: cargo llvm-cov --workspace --html

      - name: Upload workspace coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: target/llvm-cov/html/

      - name: Coverage report (xmr-wow-script stub-crypto)
        run: cargo llvm-cov --html -p xmr-wow-script --features stub-crypto

      - name: Upload script coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-script
          path: target/llvm-cov/html/

      # --- Code quality ---

      - name: Clippy
        run: cargo clippy --all-targets --workspace -- -D warnings

      # --- Supply chain ---

      - name: Install cargo-deny
        run: cargo install cargo-deny --locked

      - name: Deny check
        # Checks: advisories (known CVEs), licenses (allow-list), bans
        # (duplicate versions at deny level). Config: deny.toml
        run: cargo deny check
